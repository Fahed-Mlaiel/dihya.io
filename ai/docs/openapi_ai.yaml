openapi: 3.0.0
info:
  title: Dihya.io AI API
  version: 1.0.0
description: API documentation for Dihya.io AI module
paths:
  /ai/infer:
    post:
      summary: Run inference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: string
      responses:
        '200':
          description: Inference result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
